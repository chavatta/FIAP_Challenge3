apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting
  namespace: togglemaster
  labels:
    app.kubernetes.io/name: targeting
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: targeting
  template:
    metadata:
      labels:
        app.kubernetes.io/name: targeting
    spec:
      containers:
        - name: targeting
          image: 633853515534.dkr.ecr.us-east-1.amazonaws.com/togglemaster-targeting:v1.0.0-a6379f784ab3ccf739c1fdd77b3979c89792208e
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
