apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag
  namespace: togglemaster
  labels:
    app.kubernetes.io/name: flag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flag
    spec:
      containers:
        - name: flag
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
